spring.application.name=LztecApplication

# ===============================
# Banco de Dados PostgreSQL
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/banco
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=none

# ===============================
# Timezone
# ===============================
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

# ===============================
# Flyway (Migrations)
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.schemas=public

# ===============================
# Cloudinary (Upload de Imagens em Nuvem)
# Em producao (Railway), as variaveis de ambiente reais sao usadas.
# Localmente, sem essas variaveis, o app sobe normalmente mas o
# upload de imagem nao funciona (precisa de credenciais reais para isso).
# ===============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===============================
# REQUISITO BANCA: JWT (login com geracao/validacao de token)
# Em producao (Railway), configurar a variavel de ambiente JWT_SECRET.
# ===============================
jwt.secret=${JWT_SECRET:chave-secreta-lztec-desenvolvimento-troque-em-producao-0123456789}
jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}

# ===============================
# Inclui o campo "message" no corpo das respostas de erro (4xx/5xx).
# Sem isso, o Spring por padrao omite a mensagem (ex: "Placa invalida...")
# e o frontend so recebe o status numerico, sem a explicacao do erro.
# ===============================
server.error.include-message=always