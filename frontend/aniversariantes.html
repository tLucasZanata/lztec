    <style>
:root {
    --azul-vivo:      #1A6FFF;
    --azul-meia-noite:#060E24;
    --azul-profundo:  #091533;
    --azul-card:      #0D1D40;
    --azul-borda:     #1A3060;
    --cinza-texto:    #8EA3C3;
    --branco:         #EAF0FF;
    --acento:         #00D4FF;
    --verde:          #00DC82;
    --amarelo:        #F5A623;
    --vermelho:       #FF4D6A;
}

/* ── LIGHT MODE ── */
html[data-theme="light"] {
    --azul-meia-noite: #E8ECF2;
    --azul-profundo:   #F2F4F8;
    --azul-card:       #F7F8FC;
    --azul-borda:      #D6E0F5;
    --cinza-texto:     #5A7096;
    --branco:          #1A2B4A;
    --acento:          #0099CC;
    --verde:           #00A65C;
    --amarelo:         #C47A00;
    --vermelho:        #D93055;
}
html[data-theme="light"] body { background-color: #E8ECF2; color: #1A2B4A; }
html[data-theme="light"] .navbar-custom { background-color: #FFFFFF !important; border-bottom: 1px solid #D6E0F5; box-shadow: 0 1px 8px rgba(26,111,255,0.07); }
html[data-theme="light"] .logo-text { color: #1A2B4A; }
html[data-theme="light"] .sidebar { background-color: #F2F4F8; border-right: 1px solid #D6E0F5; }
html[data-theme="light"] .sidebar-section-label { color: #A0B4D0; }
html[data-theme="light"] .nav-link { color: #5A7096 !important; }
html[data-theme="light"] .nav-link:hover { background: rgba(26,111,255,0.06); color: #1A2B4A !important; }
html[data-theme="light"] .nav-link.active-page { background: rgba(26,111,255,0.1) !important; color: #1A6FFF !important; }
html[data-theme="light"] .main-content { background: #E8ECF2; }
html[data-theme="light"] .v-card { background: #F7F8FC; border-color: #D6E0F5; box-shadow: 0 2px 12px rgba(26,111,255,0.06); }
html[data-theme="light"] .v-card-header { border-bottom-color: #D6E0F5; }
html[data-theme="light"] .v-card-header h5 { color: #1A2B4A; }
html[data-theme="light"] .form-control, html[data-theme="light"] .form-select { background: #ECEEF5 !important; border-color: #D6E0F5 !important; color: #1A2B4A !important; }
html[data-theme="light"] .form-control::placeholder { color: #A0B4D0 !important; }
html[data-theme="light"] .form-control[readonly] { color: #A0B4D0 !important; background: #EEF3FF !important; }
html[data-theme="light"] .form-select option { background: #FFFFFF; color: #1A2B4A; }
html[data-theme="light"] .input-group-text { background: rgba(26,111,255,0.07) !important; border-color: #D6E0F5 !important; }
html[data-theme="light"] .form-label { color: #5A7096; }
html[data-theme="light"] .form-text { color: #A0B4D0; }
html[data-theme="light"] .v-table thead tr { border-bottom-color: #D6E0F5; }
html[data-theme="light"] .v-table thead th { color: #5A7096; }
html[data-theme="light"] .v-table tbody tr { border-bottom-color: #EEF2FA; }
html[data-theme="light"] .v-table tbody tr:hover { background: rgba(26,111,255,0.04); }
html[data-theme="light"] .v-table tbody td { color: #1A2B4A; }
html[data-theme="light"] .badge-codigo { background: rgba(26,111,255,0.08); color: #0A5ACC; border-color: rgba(10,90,204,0.2); }
html[data-theme="light"] .badge-valor { background: rgba(0,166,92,0.1); color: #00845A; border-color: rgba(0,166,92,0.25); }
html[data-theme="light"] .badge-estoque-ok { background: rgba(0,166,92,0.1); color: #00845A; border-color: rgba(0,166,92,0.25); }
html[data-theme="light"] .badge-estoque-baixo { background: rgba(196,122,0,0.1); color: #C47A00; border-color: rgba(196,122,0,0.25); }
html[data-theme="light"] .badge-estoque-zero { background: rgba(217,48,85,0.1); color: #D93055; border-color: rgba(217,48,85,0.2); }
html[data-theme="light"] .btn-secondary-v { border-color: #D6E0F5; color: #5A7096; }
html[data-theme="light"] .btn-secondary-v:hover { border-color: #5A7096; color: #1A2B4A; }
html[data-theme="light"] .btn-action { border-color: #D6E0F5; color: #5A7096; }
html[data-theme="light"] .page-header h1 { color: #1A2B4A; }
html[data-theme="light"] .page-header p { color: #5A7096; }
html[data-theme="light"] .page-header-icon { background: rgba(26,111,255,0.1); }
html[data-theme="light"] .section-title { color: #5A7096; }
html[data-theme="light"] #alertContainer .alert { background: #F7F8FC; border-color: #D6E0F5; color: #1A2B4A; }
html[data-theme="light"] .v-divider { border-top-color: #D6E0F5; }
html[data-theme="light"] .filter-bar .form-control,
html[data-theme="light"] .filter-bar .form-select { background: #FFFFFF !important; }

/* ── THEME TOGGLE BUTTON ── */
.btn-theme {
    background: transparent;
    border: 1px solid var(--azul-borda);
    color: var(--cinza-texto);
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; cursor: pointer;
    transition: all 0.2s;
}
.btn-theme:hover { border-color: var(--azul-vivo); color: var(--branco); }

* { box-sizing: border-box; }

body {
    background-color: var(--azul-meia-noite);
    color: var(--branco);
    font-family: 'DM Sans', sans-serif;
    margin: 0;
}

/* ── NAVBAR ── */
.navbar-custom {
    background-color: var(--azul-profundo);
    border-bottom: 1px solid var(--azul-borda);
    height: 60px;
    z-index: 1030;
    padding: 0 1.5rem;
    position: fixed;
    width: 100%;
}
.logo-wrapper { display: flex; align-items: center; gap: 10px; }
.logo-icon {
    width: 34px; height: 34px;
    background: var(--azul-vivo);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
}
.logo-icon svg { width: 20px; height: 20px; fill: white; }
.logo-icon i    { font-size: 1.05rem; color: white; }
.logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.35rem;
    letter-spacing: 3px; color: white;
}
.logo-text span { color: var(--acento); }
.btn-sair {
    background: transparent;
    border: 1px solid var(--azul-borda);
    color: var(--cinza-texto);
    font-size: 0.8rem; padding: 6px 14px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
}
.btn-sair:hover { border-color: var(--azul-vivo); color: var(--branco); }

/* ── SIDEBAR ── */
.sidebar {
    width: 240px;
    position: fixed;
    top: 60px; left: 0; bottom: 0;
    background-color: var(--azul-profundo);
    border-right: 1px solid var(--azul-borda);
    padding: 1.25rem 0;
    z-index: 1020;
    overflow-y: auto;
}
.sidebar-section-label {
    font-size: 0.65rem; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: #3A5280;
    padding: 0.75rem 1.25rem 0.4rem;
}
.nav-link {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 1.25rem;
    color: var(--cinza-texto) !important;
    font-size: 0.875rem; font-weight: 400;
    border-left: 3px solid transparent;
    transition: all 0.18s;
    text-decoration: none;
}
.nav-link:hover {
    color: var(--branco) !important;
    background: rgba(26,111,255,0.08);
    border-left-color: rgba(26,111,255,0.4);
}
.nav-link.active-page {
    color: white !important;
    background: rgba(26,111,255,0.15) !important;
    border-left: 3px solid var(--azul-vivo) !important;
}
.nav-link i { font-size: 1rem; width: 18px; text-align: center; }

/* ── LAYOUT ── */
.main-content {
    margin-left: 240px;
    padding-top: 60px;
    min-height: 100vh;
    background: var(--azul-meia-noite);
}
.main-inner { padding: 2.5rem; }

/* ── PAGE HEADER ── */
.page-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 2rem;
}
.page-header-icon {
    width: 46px; height: 46px;
    background: rgba(26,111,255,0.15);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: var(--azul-vivo); font-size: 1.3rem;
}
.page-header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem; font-weight: 700;
    color: white; margin: 0; line-height: 1;
}
.page-header p {
    font-size: 0.8rem; color: var(--cinza-texto);
    margin: 4px 0 0; font-weight: 300;
}

/* ── TOAST (mensagens de feedback) ── */
#alertContainer {
    position: fixed; bottom: 20px; right: 20px; z-index: 3000;
    width: 360px; max-width: calc(100vw - 32px);
    display: flex; flex-direction: column; gap: 10px; margin: 0 !important;
}
#alertContainer .alert { background: var(--azul-card); border: 1px solid var(--azul-borda); color: var(--branco); border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.35); animation: toastIn 0.25s ease; margin: 0; }
#alertContainer .alert-success  { border-left: 4px solid var(--verde); }
#alertContainer .alert-warning  { border-left: 4px solid var(--amarelo); }
#alertContainer .alert-danger   { border-left: 4px solid var(--vermelho); }
#alertContainer .alert-info     { border-left: 4px solid var(--acento); }
#alertContainer .btn-close { filter: invert(1) brightness(0.7); }
#alertContainer .alert.toast-leaving { animation: toastOut 0.2s ease forwards; }
@keyframes toastIn  { from { opacity:0; transform: translateX(40px); } to { opacity:1; transform: translateX(0); } }
@keyframes toastOut { from { opacity:1; transform: translateX(0); } to { opacity:0; transform: translateX(40px); } }
@media (max-width: 480px) { #alertContainer { right: 12px; bottom: 12px; left: 12px; width: auto; } }

/* ── CARD ── */
.v-card {
    background: var(--azul-card);
    border: 1px solid var(--azul-borda);
    border-radius: 14px;
    margin-bottom: 1.5rem;
}
.v-card-header {
    padding: 1.1rem 1.5rem;
    border-bottom: 1px solid var(--azul-borda);
    display: flex; align-items: center; justify-content: space-between;
}
.v-card-header h5 {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem; font-weight: 600;
    color: var(--branco); margin: 0;
    letter-spacing: 0.5px;
}
.v-card-body { padding: 1.5rem; }

/* ── FORM CONTROLS ── */
.form-label {
    font-size: 0.78rem; font-weight: 500;
    color: var(--cinza-texto);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
}
.form-label .obrig { color: var(--vermelho); }
.form-control, .form-select {
    background: var(--azul-profundo) !important;
    border: 1px solid var(--azul-borda) !important;
    color: var(--branco) !important;
    border-radius: 8px;
    font-size: 0.9rem;
    padding: 0.55rem 0.85rem;
    transition: border-color 0.2s, box-shadow 0.2s;
}
.form-control:focus, .form-select:focus {
    border-color: var(--azul-vivo) !important;
    box-shadow: 0 0 0 3px rgba(26,111,255,0.15) !important;
    outline: none;
}
.form-control::placeholder { color: #3A5280 !important; }
.form-control[readonly] {
    color: #3A5280 !important;
    cursor: default;
}
.form-text {
    font-size: 0.72rem; color: #3A5280;
    margin-top: 4px;
}
.input-group-text {
    background: rgba(26,111,255,0.1) !important;
    border: 1px solid var(--azul-borda) !important;
    color: var(--azul-vivo) !important;
    border-radius: 8px !important;
    font-size: 0.85rem;
}
.input-group .form-control {
    border-radius: 8px !important;
}
.input-group > :not(:last-child) .form-control,
.input-group > .form-control:not(:last-child) {
    border-top-right-radius: 0 !important;
    border-bottom-right-radius: 0 !important;
}
.input-group > :not(:first-child) .form-control,
.input-group > .form-control:not(:first-child) {
    border-top-left-radius: 0 !important;
    border-bottom-left-radius: 0 !important;
}
.input-group > :not(:last-child).input-group-text {
    border-top-right-radius: 0 !important;
    border-bottom-right-radius: 0 !important;
}
.input-group > :not(:first-child).input-group-text {
    border-top-left-radius: 0 !important;
    border-bottom-left-radius: 0 !important;
}

/* ── BUTTONS ── */
.btn-primary-v {
    background: var(--azul-vivo);
    border: none; color: white;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500; font-size: 0.9rem;
    padding: 10px 24px; border-radius: 8px;
    display: inline-flex; align-items: center; gap: 8px;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
}
.btn-primary-v:hover { background: #1560e0; transform: translateY(-1px); }
.btn-success-v {
    background: rgba(0,220,130,0.15);
    border: 1px solid var(--verde);
    color: var(--verde);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500; font-size: 0.9rem;
    padding: 10px 24px; border-radius: 8px;
    display: inline-flex; align-items: center; gap: 8px;
    cursor: pointer; transition: background 0.2s;
}
.btn-success-v:hover { background: rgba(0,220,130,0.25); }
.btn-secondary-v {
    background: transparent;
    border: 1px solid var(--azul-borda);
    color: var(--cinza-texto);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400; font-size: 0.9rem;
    padding: 10px 20px; border-radius: 8px;
    display: inline-flex; align-items: center; gap: 8px;
    cursor: pointer; transition: all 0.18s;
}
.btn-secondary-v:hover { border-color: var(--cinza-texto); color: var(--branco); }

/* ── DIVIDER ── */
.v-divider {
    border: none;
    border-top: 1px solid var(--azul-borda);
    margin: 1.5rem 0;
}

/* ── SECTION TITLE ── */
.section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem; font-weight: 600;
    color: var(--cinza-texto);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 1rem; margin-top: 2rem;
}

/* ── FILTER BAR ── */
.filter-bar {
    display: flex; gap: 0.75rem; flex-wrap: wrap;
    margin-bottom: 1.25rem;
}
.filter-bar .form-control,
.filter-bar .form-select { max-width: 260px; }

/* ── TABLE ── */
.v-table { width: 100%; border-collapse: collapse; }
.v-table thead tr {
    border-bottom: 1px solid var(--azul-borda);
}
.v-table thead th {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--cinza-texto);
    padding: 0.75rem 1rem;
    white-space: nowrap;
}
.v-table tbody tr {
    border-bottom: 1px solid rgba(26,48,96,0.5);
    transition: background 0.15s;
}
.v-table tbody tr:hover { background: rgba(26,111,255,0.05); }
.v-table tbody td {
    padding: 0.85rem 1rem;
    font-size: 0.875rem;
    color: var(--branco);
    vertical-align: middle;
}

/* ── PAGINAÇÃO ── */
.v-pagination { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 0.85rem 0; }
.pg-arrow { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--azul-borda); background: var(--azul-card); color: var(--branco); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; transition: all 0.15s; padding: 0; }
.pg-arrow:hover:not(:disabled) { border-color: var(--azul-vivo); color: var(--azul-vivo); }
.pg-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
.pg-dots { display: flex; align-items: center; gap: 6px; }
.pg-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--azul-borda); border: none; padding: 0; cursor: pointer; transition: all 0.15s; }
.pg-dot:hover { opacity: 0.7; }
.pg-dot.active { background: var(--azul-vivo); width: 20px; border-radius: 4px; }
html[data-theme="light"] .pg-arrow { background: #FFFFFF; border-color: #D6E0F5; color: #1A2B4A; }
html[data-theme="light"] .pg-dot   { background: #D6E0F5; }

/* ── BADGES ── */
.badge-codigo {
    font-family: 'Courier New', monospace;
    font-size: 0.75rem; letter-spacing: 1px;
    background: rgba(26,111,255,0.12);
    color: var(--acento);
    border: 1px solid rgba(0,212,255,0.2);
    padding: 3px 8px; border-radius: 5px;
}
.badge-valor {
    font-size: 0.8rem; font-weight: 500;
    background: rgba(0,220,130,0.1);
    color: var(--verde);
    border: 1px solid rgba(0,220,130,0.2);
    padding: 3px 10px; border-radius: 5px;
}
.badge-estoque-ok {
    font-size: 0.75rem;
    background: rgba(0,220,130,0.12);
    color: var(--verde);
    border: 1px solid rgba(0,220,130,0.2);
    padding: 3px 10px; border-radius: 5px;
}
.badge-estoque-baixo {
    font-size: 0.75rem;
    background: rgba(245,166,35,0.12);
    color: var(--amarelo);
    border: 1px solid rgba(245,166,35,0.25);
    padding: 3px 10px; border-radius: 5px;
}
.badge-estoque-zero {
    font-size: 0.75rem;
    background: rgba(255,77,106,0.12);
    color: var(--vermelho);
    border: 1px solid rgba(255,77,106,0.25);
    padding: 3px 10px; border-radius: 5px;
}

/* ── ACTION BUTTONS ── */
.btn-action {
    width: 32px; height: 32px;
    border-radius: 7px; border: 1px solid var(--azul-borda);
    background: transparent; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 0.85rem; color: var(--cinza-texto);
    transition: all 0.18s; margin: 0 2px;
}
.btn-action:hover { border-color: var(--azul-vivo); color: var(--azul-vivo); background: rgba(26,111,255,0.08); }
.btn-action.danger:hover { border-color: var(--vermelho); color: var(--vermelho); background: rgba(255,77,106,0.08); }

/* ── CODE BADGE IN HEADER ── */
#codigoGeradoBadge { display: none; }

/* ── RESPONSIVE ── */
@media (max-width: 992px) {
    .sidebar { display: none !important; }
    .main-content { margin-left: 0; }
}
    /* ── RBAC ── */
.admin-only { display: none !important; }
body.role-admin .admin-only { display: inline-flex !important; }
body.role-admin .admin-only-block { display: block !important; }
.admin-only-block { display: none !important; }

    </style>
</head>

            <p class="sidebar-section-label">Relatórios</p>
            <a class="nav-link" href="relatorio-vendas-pagas.html"><i class="bi bi-file-earmark-bar-graph-fill"></i> Vendas Pagas</a>
            <a class="nav-link" href="relatorio-vendas-pendentes.html"><i class="bi bi-hourglass-split"></i> Vendas Pendentes</a>

            <p class="sidebar-section-label admin-only-block">Administração</p>
            <a class="nav-link admin-only" href="gerenciar-usuarios.html"><i class="bi bi-people-fill"></i> Usuários</a>
        </nav>
    </div>

    <!-- MAIN -->
    <main class="main-content flex-grow-1">
        <div class="main-inner">

            <!-- Page Header -->
            <div class="page-header">
                <div class="page-header-icon"><i class="bi bi-gift-fill"></i></div>
                <div>
                    <h1>Aniversariantes</h1>
                    <p id="subtituloData">Clientes que fazem aniversário hoje</p>
                </div>
            </div>

            <div id="alertContainer"></div>

            <div class="v-card">
                <div class="v-card-header"><h5><i class="bi bi-balloon-heart-fill section-icon"></i>Hoje</h5></div>
                <div class="v-card-body">
                    <div id="listaAniversariantes">
                        <p style="color:var(--cinza-texto);text-align:center;padding:2rem 0;"><i class="bi bi-arrow-repeat me-2"></i>Carregando…</p>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Detecta automaticamente se esta rodando local ou em producao
    const _BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
        ? 'http://localhost:8080' : 'https://valora-production-35b1.up.railway.app';
    const API_URL_CLIENTES = `${_BASE}/api/clientes`;
    const AUTH_TOKEN = localStorage.getItem('auth_token') || '';

    // ── THEME ──────────────────────────────────────────────────────────────
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        const icon = document.getElementById('themeIcon');
        if (theme === 'light') { icon.className = 'bi bi-sun-fill'; document.getElementById('btnTheme').style.color = '#F5A623'; }
        else { icon.className = 'bi bi-moon-fill'; document.getElementById('btnTheme').style.color = ''; }
    }
    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme') || 'dark';
        const next = current === 'dark' ? 'light' : 'dark';
        localStorage.setItem('valora_theme', next);
        applyTheme(next);
    }
    applyTheme(localStorage.getItem('valora_theme') || 'dark');
    function sair() { localStorage.removeItem('auth_token'); window.location.href = 'login.html'; }
    // ───────────────────────────────────────────────────────────────────────

    function showFeedback(message, type) {
        const icons = { success: 'check-circle-fill', warning: 'exclamation-triangle-fill', danger: 'x-circle-fill', info: 'info-circle-fill' };
        const el = document.createElement('div');
        el.className = `alert alert-${type} d-flex align-items-start gap-3`;
        el.innerHTML = `<i class="bi bi-${icons[type]||'info-circle-fill'}" style="font-size:1.1rem;margin-top:1px;"></i><div class="flex-grow-1">${message}</div><button type="button" class="btn-close"></button>`;
        document.getElementById('alertContainer').appendChild(el);
        const remover = () => { el.classList.add('toast-leaving'); setTimeout(() => el.remove(), 200); };
        el.querySelector('.btn-close').addEventListener('click', remover);
        setTimeout(remover, 5000);
    }

    function formatarTelefone(v) {
        const d = (v || '').replace(/\D/g, '');
        if (d.length === 11) return `(${d.substring(0,2)}) ${d.substring(2,7)}-${d.substring(7)}`;
        if (d.length === 10) return `(${d.substring(0,2)}) ${d.substring(2,6)}-${d.substring(6)}`;
        return v || '';
    }

    function linkWhatsapp(telefone, nome) {
        const digitos = (telefone || '').replace(/\D/g, '');
        if (!digitos) return null;
        const numero = digitos.length <= 11 ? '55' + digitos : digitos; // assume Brasil se não tiver DDI
        const msg = encodeURIComponent(`Oi ${nome}! Passando pra desejar um feliz aniversário! 🎉🎂`);
        return `https://wa.me/${numero}?text=${msg}`;
    }

    async function carregarAniversariantes() {
        const wrap = document.getElementById('listaAniversariantes');
        const hoje = new Date();
        document.getElementById('subtituloData').textContent =
            'Clientes que fazem aniversário hoje, ' + hoje.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long' });

        try {
            const r = await fetch(API_URL_CLIENTES, { headers: { 'Authorization': AUTH_TOKEN } });
            if (!r.ok) throw new Error();
            const clientes = await r.json();

            const hojeMes = hoje.getMonth() + 1;
            const hojeDia = hoje.getDate();

            const aniversariantes = clientes.filter(c => {
                if (!c['data_nascimento']) return false;
                const [, mes, dia] = c['data_nascimento'].split('-').map(Number);
                return mes === hojeMes && dia === hojeDia;
            });

            if (!aniversariantes.length) {
                wrap.innerHTML = `
                    <div style="text-align:center;padding:2.5rem 0;color:var(--cinza-texto);">
                        <i class="bi bi-calendar-x" style="font-size:2rem;display:block;margin-bottom:0.75rem;opacity:0.6;"></i>
                        Nenhum cliente faz aniversário hoje.
                    </div>`;
                return;
            }

            wrap.innerHTML = aniversariantes.map(c => {
                const [ano] = c['data_nascimento'].split('-').map(Number);
                const idade = hoje.getFullYear() - ano;
                const wa = linkWhatsapp(c.contato, c.nome);
                return `
                <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem;border:1px solid var(--azul-borda);border-radius:10px;margin-bottom:0.75rem;">
                    <div style="display:flex;align-items:center;gap:0.9rem;">
                        <div style="width:44px;height:44px;border-radius:10px;background:rgba(245,166,35,0.14);display:flex;align-items:center;justify-content:center;font-size:1.3rem;">🎂</div>
                        <div>
                            <div style="font-weight:600;">${c.nome}</div>
                            <div style="font-size:0.8rem;color:var(--cinza-texto);">Fazendo ${idade} anos hoje${c.contato ? ' · ' + formatarTelefone(c.contato) : ''}</div>
                        </div>
                    </div>
                    ${wa ? `<a href="${wa}" target="_blank" class="btn-outline-add" style="text-decoration:none;"><i class="bi bi-whatsapp"></i> Parabenizar</a>` : ''}
                </div>`;
            }).join('');
        } catch {
            wrap.innerHTML = '<p style="color:var(--vermelho);text-align:center;padding:2rem 0;">Falha ao carregar os clientes.</p>';
        }
    }

    window.onload = function() {
        const role = localStorage.getItem('user_role') || 'OPERADOR';
        const nome = localStorage.getItem('user_nome') || '';
        document.body.classList.add('role-' + role.toLowerCase());
        const uiEl = document.getElementById('userInfo');
        if (uiEl && nome) uiEl.textContent = nome + ' · ' + (role === 'ADMIN' ? '🔴 Admin' : '🟢 Operador');

        carregarAniversariantes();
    };
</script>
</body>
</html>
