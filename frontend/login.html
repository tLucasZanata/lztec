/* ── CSS VARIABLES — DARK (default) ── */
:root {
    --azul-vivo:       #1A6FFF;
    --azul-meia-noite: #060E24;
    --azul-profundo:   #091533;
    --azul-card:       #0D1D40;
    --azul-borda:      #1A3060;
    --cinza-texto:     #8EA3C3;
    --branco:          #EAF0FF;
    --acento:          #00D4FF;
    --verde:           #00DC82;
    --amarelo:         #F5A623;
    --vermelho:        #FF4D6A;
}

/* ── LIGHT MODE ── */
html[data-theme="light"] {
    --azul-meia-noite: #E8ECF2;
    --azul-profundo:   #F2F4F8;
    --azul-card:       #F7F8FC;
    --azul-borda:      #D6E0F5;
    --cinza-texto:     #5A7096;
    --branco:          #1A2B4A;
    --acento:          #0099CC;
    --verde:           #00A65C;
    --amarelo:         #C47A00;
    --vermelho:        #D93055;
}
html[data-theme="light"] body          { background-color: #E8ECF2; color: #1A2B4A; }
html[data-theme="light"] .navbar-custom{ background-color: #FFFFFF !important; border-bottom: 1px solid #D6E0F5; box-shadow: 0 1px 8px rgba(26,111,255,0.07); }
html[data-theme="light"] .logo-text    { color: #1A2B4A; }
html[data-theme="light"] .sidebar      { background-color: #F2F4F8; border-right: 1px solid #D6E0F5; }
html[data-theme="light"] .sidebar-section-label { color: #A0B4D0; }
html[data-theme="light"] .nav-link     { color: #5A7096 !important; }
html[data-theme="light"] .nav-link:hover { background: rgba(26,111,255,0.06); color: #1A2B4A !important; }
html[data-theme="light"] .nav-link.active-page { background: rgba(26,111,255,0.1) !important; color: #1A6FFF !important; }
html[data-theme="light"] .main-content { background: #E8ECF2; }
html[data-theme="light"] .v-card       { background: #F7F8FC; border-color: #D6E0F5; box-shadow: 0 2px 12px rgba(26,111,255,0.06); }
html[data-theme="light"] .v-card-header{ border-bottom-color: #D6E0F5; }
html[data-theme="light"] .v-card-header h5 { color: #1A2B4A; }
html[data-theme="light"] .form-control,
html[data-theme="light"] .form-select  { background: #ECEEF5 !important; border-color: #D6E0F5 !important; color: #1A2B4A !important; }
html[data-theme="light"] .form-control::placeholder { color: #A0B4D0 !important; }
html[data-theme="light"] .form-control[readonly]     { color: #A0B4D0 !important; background: #EEF3FF !important; }
html[data-theme="light"] .form-select option         { background: #FFFFFF; color: #1A2B4A; }
html[data-theme="light"] .input-group-text { background: rgba(26,111,255,0.07) !important; border-color: #D6E0F5 !important; }
html[data-theme="light"] .form-label   { color: #5A7096; }
html[data-theme="light"] .form-text    { color: #A0B4D0; }
html[data-theme="light"] .form-section-title         { color: #5A7096; }
html[data-theme="light"] .form-section-title::after  { background: #D6E0F5; }
html[data-theme="light"] .v-table thead tr  { border-bottom-color: #D6E0F5; }
html[data-theme="light"] .v-table thead th  { color: #5A7096; }
html[data-theme="light"] .v-table tbody tr  { border-bottom-color: #EEF2FA; }
html[data-theme="light"] .v-table tbody tr:hover { background: rgba(26,111,255,0.04); }
html[data-theme="light"] .v-table tbody td  { color: #1A2B4A; }
html[data-theme="light"] .v-table tfoot td  { color: #1A2B4A; border-top-color: #D6E0F5; background: #F6F9FF; }
html[data-theme="light"] .badge-codigo      { background: rgba(26,111,255,0.08); color: #0A5ACC; border-color: rgba(10,90,204,0.2); }
html[data-theme="light"] .badge-valor       { background: rgba(0,166,92,0.1); color: #00845A; border-color: rgba(0,166,92,0.25); }
html[data-theme="light"] .badge-info        { background: rgba(0,153,204,0.1); color: #0077AA; border-color: rgba(0,153,204,0.25); }
html[data-theme="light"] .badge-placa       { background: rgba(245,166,35,0.1); color: #7A5200; border: 1px solid rgba(245,166,35,0.4); }
html[data-theme="light"] .badge-lucro       { color: #00845A; }
html[data-theme="light"] .badge-prejuizo    { color: #D93055; }
html[data-theme="light"] .btn-secondary-v   { border-color: #D6E0F5; color: #5A7096; }
html[data-theme="light"] .btn-secondary-v:hover { border-color: #5A7096; color: #1A2B4A; }
html[data-theme="light"] .btn-outline-add   { background: rgba(26,111,255,0.06); border-color: rgba(26,111,255,0.25); }
html[data-theme="light"] .btn-action        { border-color: #D6E0F5; color: #5A7096; }
html[data-theme="light"] .page-header h1    { color: #1A2B4A; }
html[data-theme="light"] .page-header p     { color: #5A7096; }
html[data-theme="light"] .page-header-icon  { background: rgba(26,111,255,0.1); }
html[data-theme="light"] .section-title     { color: #5A7096; }
html[data-theme="light"] #alertContainer .alert { background: #F7F8FC; border-color: #D6E0F5; color: #1A2B4A; }
html[data-theme="light"] .v-divider         { border-top-color: #D6E0F5; }
html[data-theme="light"] .total-box         { background: #ECEEF5; border-color: #D6E0F5; }
html[data-theme="light"] .total-box .lbl    { color: #5A7096; }
html[data-theme="light"] .total-box .horas  { color: #1A2B4A; }
html[data-theme="light"] .filter-bar .form-control,
html[data-theme="light"] .filter-bar .form-select { background: #FFFFFF !important; }
html[data-theme="light"] .checkbox-container { background: #ECEEF5; border-color: #D6E0F5; }
html[data-theme="light"] .checkbox-item label { color: #1A2B4A; }
html[data-theme="light"] .km-total-box      { background: #ECEEF5; border-color: #D6E0F5; }
html[data-theme="light"] .km-total-box .lbl { color: #5A7096; }
html[data-theme="light"] .login-box         { background: #F7F8FC; border-color: #D6E0F5; }
html[data-theme="light"] .login-box h2,
html[data-theme="light"] .login-box p       { color: #1A2B4A; }

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; }

/* ── BASE ── */
body {
    background-color: var(--azul-meia-noite);
    color: var(--branco);
    font-family: 'DM Sans', sans-serif;
    margin: 0;
}

/* ── NAVBAR ── */
.navbar-custom {
    background-color: var(--azul-profundo);
    border-bottom: 1px solid var(--azul-borda);
    height: 60px; z-index: 1030;
    padding: 0 1.5rem; position: fixed; width: 100%;
    display: flex; align-items: center; justify-content: space-between;
}
.logo-wrapper   { display: flex; align-items: center; gap: 10px; }
.logo-icon      { width: 34px; height: 34px; background: var(--azul-vivo); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.logo-icon svg  { width: 20px; height: 20px; fill: white; }
.logo-icon i    { font-size: 1.05rem; color: white; }
.logo-text      { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem; letter-spacing: 3px; color: white; }
.logo-text span { color: var(--acento); }
.navbar-right   { display: flex; align-items: center; gap: 8px; }
.btn-sair {
    background: transparent; border: 1px solid var(--azul-borda);
    color: var(--cinza-texto); font-size: 0.8rem; padding: 6px 14px;
    border-radius: 6px; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px; cursor: pointer;
}
.btn-sair:hover { border-color: var(--azul-vivo); color: var(--branco); }
.btn-theme {
    background: transparent; border: 1px solid var(--azul-borda);
    color: var(--cinza-texto); width: 36px; height: 36px;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 1rem; cursor: pointer; transition: all 0.2s;
}
.btn-theme:hover { border-color: var(--azul-vivo); color: var(--branco); }

/* ── SIDEBAR ── */
.sidebar {
    width: 240px; position: fixed; top: 60px; left: 0; bottom: 0;
    background-color: var(--azul-profundo); border-right: 1px solid var(--azul-borda);
    padding: 1.25rem 0; z-index: 1020; overflow-y: auto;
}
.sidebar-section-label {
    font-size: 0.65rem; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: #3A5280;
    padding: 0.75rem 1.25rem 0.4rem;
}
.nav-link {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 1.25rem; color: var(--cinza-texto) !important;
    font-size: 0.875rem; font-weight: 400;
    border-left: 3px solid transparent; transition: all 0.18s; text-decoration: none;
}
.nav-link:hover { color: var(--branco) !important; background: rgba(26,111,255,0.08); border-left-color: rgba(26,111,255,0.4); }
.nav-link.active-page { color: white !important; background: rgba(26,111,255,0.15) !important; border-left: 3px solid var(--azul-vivo) !important; }
.nav-link i { font-size: 1rem; width: 18px; text-align: center; }

/* ── LAYOUT ── */
.main-content { margin-left: 240px; padding-top: 60px; min-height: 100vh; background: var(--azul-meia-noite); }
.main-inner   { padding: 2.5rem; }

/* ── PAGE HEADER ── */
.page-header  { display: flex; align-items: center; gap: 14px; margin-bottom: 2rem; }
.page-header-icon { width: 46px; height: 46px; background: rgba(26,111,255,0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--azul-vivo); font-size: 1.3rem; }
.page-header h1 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; color: white; margin: 0; line-height: 1; }
.page-header p  { font-size: 0.8rem; color: var(--cinza-texto); margin: 4px 0 0; font-weight: 300; }

/* ── SECTION TITLE ── */
.section-title { font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 600; color: var(--cinza-texto); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 1rem; margin-top: 2rem; }

/* ── ALERT ── */
#alertContainer .alert { background: var(--azul-card); border-color: var(--azul-borda); color: var(--branco); border-radius: 10px; }
#alertContainer .alert-success { border-left: 4px solid var(--verde); }
#alertContainer .alert-warning { border-left: 4px solid var(--amarelo); }
#alertContainer .alert-danger  { border-left: 4px solid var(--vermelho); }
#alertContainer .alert-info    { border-left: 4px solid var(--acento); }
#alertContainer .btn-close     { filter: invert(1) brightness(0.7); }

/* ── CARD ── */
.v-card        { background: var(--azul-card); border: 1px solid var(--azul-borda); border-radius: 14px; margin-bottom: 1.5rem; }
.v-card-header { padding: 1.1rem 1.5rem; border-bottom: 1px solid var(--azul-borda); display: flex; align-items: center; justify-content: space-between; }
.v-card-header h5 { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 600; color: var(--branco); margin: 0; letter-spacing: 0.5px; }
.v-card-header .section-icon { color: var(--azul-vivo); margin-right: 8px; }
.v-card-body   { padding: 1.5rem; }

/* ── FORM ── */
.form-label { font-size: 0.72rem; font-weight: 500; color: var(--cinza-texto); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.form-label .obrig { color: var(--vermelho); }
.form-control, .form-select {
    background: var(--azul-profundo) !important; border: 1px solid var(--azul-borda) !important;
    color: var(--branco) !important; border-radius: 8px; font-size: 0.9rem; padding: 0.55rem 0.85rem;
    transition: border-color 0.2s, box-shadow 0.2s;
}
.form-control:focus, .form-select:focus {
    border-color: var(--azul-vivo) !important; box-shadow: 0 0 0 3px rgba(26,111,255,0.15) !important; outline: none;
}
.form-control::placeholder { color: #3A5280 !important; }
.form-control[readonly]    { color: #3A5280 !important; cursor: default; }
.form-select option        { background: var(--azul-card); color: var(--branco); }
.form-select option:disabled { color: #3A5280; }
.form-text { font-size: 0.72rem; color: #3A5280; margin-top: 4px; }
.input-group-text {
    background: rgba(26,111,255,0.1) !important; border: 1px solid var(--azul-borda) !important;
    color: var(--azul-vivo) !important; font-size: 0.85rem;
}
select[multiple] { min-height: 90px; }

/* ── FORM SECTION TITLE ── */
.form-section-title {
    font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; color: var(--cinza-texto);
    margin: 1.5rem 0 1rem; display: flex; align-items: center; gap: 8px;
}
.form-section-title::after { content: ''; flex: 1; height: 1px; background: var(--azul-borda); }
.form-section-title i { color: var(--azul-vivo); font-size: 0.9rem; }

/* ── CHECKBOX CONTAINER ── */
.checkbox-container {
    background: var(--azul-profundo); border: 1px solid var(--azul-borda);
    border-radius: 8px; padding: 1rem; max-height: 200px; overflow-y: auto;
}
.checkbox-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
.checkbox-item input[type="checkbox"] { accent-color: var(--azul-vivo); width: 15px; height: 15px; cursor: pointer; }
.checkbox-item label { font-size: 0.875rem; color: var(--branco); cursor: pointer; margin: 0; }

/* ── BUTTONS ── */
.btn-primary-v {
    background: var(--azul-vivo); border: none; color: white;
    font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.9rem;
    padding: 10px 24px; border-radius: 8px;
    display: inline-flex; align-items: center; gap: 8px;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
}
.btn-primary-v:hover { background: #1560e0; transform: translateY(-1px); }
.btn-success-v {
    background: rgba(0,220,130,0.15); border: 1px solid var(--verde); color: var(--verde);
    font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.9rem;
    padding: 10px 24px; border-radius: 8px;
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: background 0.2s;
}
.btn-success-v:hover { background: rgba(0,220,130,0.25); }
.btn-secondary-v {
    background: transparent; border: 1px solid var(--azul-borda); color: var(--cinza-texto);
    font-family: 'DM Sans', sans-serif; font-weight: 400; font-size: 0.9rem;
    padding: 10px 20px; border-radius: 8px;
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: all 0.18s;
}
.btn-secondary-v:hover { border-color: var(--cinza-texto); color: var(--branco); }
.btn-outline-add {
    background: rgba(26,111,255,0.08); border: 1px solid rgba(26,111,255,0.35); color: var(--azul-vivo);
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; padding: 8px 16px; border-radius: 8px;
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.btn-outline-add:hover { background: rgba(26,111,255,0.18); border-color: var(--azul-vivo); }
.btn-pdf {
    background: rgba(0,220,130,0.08); border: 1px solid rgba(0,220,130,0.35); color: var(--verde);
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; padding: 8px 16px; border-radius: 8px;
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer; transition: all 0.18s;
}
.btn-pdf:hover { background: rgba(0,220,130,0.18); border-color: var(--verde); }
.btn-range {
    background: transparent; border: 1px solid var(--azul-borda); color: var(--cinza-texto);
    font-size: 0.78rem; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.18s;
    font-family: 'DM Sans', sans-serif;
}
.btn-range:hover { border-color: var(--azul-vivo); color: var(--branco); background: rgba(26,111,255,0.08); }

/* ── TABLE ── */
.v-table { width: 100%; border-collapse: collapse; }
.v-table thead tr  { border-bottom: 1px solid var(--azul-borda); }
.v-table thead th  { font-family: 'Syne', sans-serif; font-size: 0.62rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--cinza-texto); padding: 0.75rem 1rem; white-space: nowrap; }
.v-table tbody tr  { border-bottom: 1px solid rgba(26,48,96,0.5); transition: background 0.15s; }
.v-table tbody tr:hover { background: rgba(26,111,255,0.05); }
.v-table tbody td  { padding: 0.85rem 1rem; font-size: 0.875rem; color: var(--branco); vertical-align: middle; }
.v-table tfoot td  { padding: 0.85rem 1rem; font-size: 0.85rem; color: var(--branco); font-weight: 600; border-top: 1px solid var(--azul-borda); background: rgba(26,48,96,0.2); }

/* ── BADGES ── */
.badge-codigo  { font-family: 'Courier New', monospace; font-size: 0.75rem; letter-spacing: 1px; background: rgba(26,111,255,0.12); color: var(--acento); border: 1px solid rgba(0,212,255,0.2); padding: 3px 8px; border-radius: 5px; }
.badge-valor   { font-size: 0.75rem; background: rgba(0,220,130,0.1); color: var(--verde); border: 1px solid rgba(0,220,130,0.2); padding: 3px 10px; border-radius: 5px; }
.badge-info    { font-size: 0.75rem; background: rgba(0,212,255,0.1); color: var(--acento); border: 1px solid rgba(0,212,255,0.2); padding: 3px 10px; border-radius: 5px; font-family: 'Courier New', monospace; }
.badge-placa   { font-family: 'Courier New', monospace; font-size: 0.75rem; letter-spacing: 2px; background: rgba(245,166,35,0.12); color: var(--amarelo); border: 1px solid rgba(245,166,35,0.3); padding: 3px 10px; border-radius: 5px; }
.badge-lucro   { font-size: 0.78rem; font-weight: 600; color: var(--verde); }
.badge-prejuizo{ font-size: 0.78rem; font-weight: 600; color: var(--vermelho); }
.badge-estoque-ok    { font-size: 0.75rem; background: rgba(0,220,130,0.12); color: var(--verde); border: 1px solid rgba(0,220,130,0.2); padding: 3px 10px; border-radius: 5px; }
.badge-estoque-baixo { font-size: 0.75rem; background: rgba(245,166,35,0.12); color: var(--amarelo); border: 1px solid rgba(245,166,35,0.25); padding: 3px 10px; border-radius: 5px; }
.badge-estoque-zero  { font-size: 0.75rem; background: rgba(255,77,106,0.12); color: var(--vermelho); border: 1px solid rgba(255,77,106,0.25); padding: 3px 10px; border-radius: 5px; }

/* ── ACTION BUTTONS ── */
.btn-action { width: 32px; height: 32px; border-radius: 7px; border: 1px solid var(--azul-borda); background: transparent; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 0.85rem; color: var(--cinza-texto); transition: all 0.18s; margin: 0 2px; }
.btn-action:hover { border-color: var(--azul-vivo); color: var(--azul-vivo); background: rgba(26,111,255,0.08); }
.btn-action.danger:hover { border-color: var(--vermelho); color: var(--vermelho); background: rgba(255,77,106,0.08); }

/* ── DIVIDERS ── */
.v-divider { border: none; border-top: 1px solid var(--azul-borda); margin: 1.5rem 0; }

/* ── TOTAL BOX ── */
.total-box { background: var(--azul-profundo); border: 1px solid var(--azul-borda); border-radius: 10px; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem; }
.total-box .lbl   { font-size: 0.78rem; color: var(--cinza-texto); text-transform: uppercase; letter-spacing: 1px; }
.total-box .val   { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--verde); }
.total-box .horas { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 600; color: var(--branco); }

/* ── KM TOTAL BOX ── */
.km-total-box { background: var(--azul-profundo); border: 1px solid var(--azul-borda); border-radius: 8px; padding: 0.6rem 1rem; display: flex; align-items: center; gap: 8px; }
.km-total-box .lbl { font-size: 0.7rem; color: var(--cinza-texto); text-transform: uppercase; letter-spacing: 1px; }
.km-total-box .val { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: var(--acento); }

/* ── FILTER BAR ── */
.filter-bar { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: flex-end; }
.filter-bar .form-control,
.filter-bar .form-select { max-width: 260px; }

/* ── PROD MINI TABLE ── */
.prod-table { width: 100%; border-collapse: collapse; margin-top: 0.75rem; }
.prod-table th  { font-family: 'Syne', sans-serif; font-size: 0.62rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--cinza-texto); padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--azul-borda); }
.prod-table td  { padding: 0.65rem 0.75rem; font-size: 0.85rem; border-bottom: 1px solid rgba(26,48,96,0.4); vertical-align: middle; color: var(--branco); }
.prod-table tfoot td { border-top: 1px solid var(--azul-borda); border-bottom: none; font-weight: 600; color: var(--branco); }

/* ── LOGIN SPECIAL ── */
.login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.login-box { width: 100%; max-width: 420px; background: var(--azul-card); border: 1px solid var(--azul-borda); border-radius: 20px; overflow: hidden; }
.login-header { background: linear-gradient(135deg, var(--azul-profundo) 0%, rgba(26,111,255,0.2) 100%); padding: 2.5rem 2rem; text-align: center; border-bottom: 1px solid var(--azul-borda); }
html[data-theme="light"] .login-header { background: linear-gradient(135deg, #2A2F3E 0%, #1C2333 100%); border-bottom-color: #3A4056; }
html[data-theme="light"] .login-nome { color: #FFFFFF; }
html[data-theme="light"] .login-sub { color: #8EA3C3; }
.login-badge  { width: 64px; height: 64px; background: linear-gradient(135deg, var(--azul-vivo), var(--acento)); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; box-shadow: 0 0 30px rgba(26,111,255,0.3); }
.login-badge svg { width: 34px; height: 34px; fill: white; }
.login-badge i   { font-size: 1.9rem; color: white; }
.login-nome   { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; letter-spacing: 4px; color: white; }
.login-nome span { color: var(--acento); }
.login-sub    { font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--cinza-texto); margin-top: 4px; }
.login-body   { padding: 2rem; }
.login-footer { padding: 0.85rem 2rem; border-top: 1px solid var(--azul-borda); text-align: center; font-size: 0.72rem; color: var(--cinza-texto); }

/* ── ALTERAR SENHA ── */
.link-alterar { display: block; text-align: center; margin-top: 0.85rem; font-size: 0.8rem; color: var(--cinza-texto); cursor: pointer; text-decoration: none; transition: color 0.2s; }
.link-alterar:hover { color: var(--azul-vivo); }
.senha-strength { height: 4px; border-radius: 4px; margin-top: 6px; background: var(--azul-borda); overflow: hidden; }
.senha-strength-bar { height: 100%; border-radius: 4px; width: 0; transition: width 0.3s, background 0.3s; }
.senha-hint { font-size: 0.72rem; margin-top: 4px; }

/* ── RESPONSIVE ── */
@media (max-width: 992px) {
    .sidebar      { display: none !important; }
    .main-content { margin-left: 0; }
}

</style>
</head>
<body>

<!-- Navbar minimal no login -->
<nav class="navbar-custom">
    <div class="logo-wrapper">
        <div class="logo-icon">
            <i class="bi bi-cart-fill"></i>
        </div>
        <span class="logo-text">LZ<span>Tec</span></span>
    </div>
    <button class="btn-theme" id="btnTheme" onclick="toggleTheme()" title="Alternar tema">
        <i class="bi bi-moon-fill" id="themeIcon"></i>
    </button>
</nav>

<div class="login-wrapper" style="padding-top:60px;">
    <div class="login-box">

        <div class="login-header">
            <div class="login-badge">
                <i class="bi bi-cart-fill"></i>
            </div>
            <div class="login-nome">LZ<span>Tec</span></div>
            <div class="login-sub">Sistema de Controle de Vendas</div>
        </div>

        <div class="login-body">
            <div id="alertContainer" class="mb-3" style="display:none;"></div>

            <!-- FORM LOGIN -->
            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <label class="form-label">Usuário</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                        <input type="text" class="form-control" id="inputUsername" placeholder="Nome de usuário" autocomplete="username" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" id="inputSenha" placeholder="Senha" autocomplete="current-password" required>
                        <button class="btn-secondary-v" type="button" id="btnToggleSenha" tabindex="-1" style="border-radius:0 8px 8px 0;padding:0 12px;">
                            <i class="bi bi-eye-fill" id="iconeSenha"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="btnEntrar" class="btn-primary-v w-100 justify-content-center">
                    <i class="bi bi-box-arrow-in-right"></i> Entrar
                </button>
                <a class="link-alterar" id="linkAlterarSenha"><i class="bi bi-key-fill me-1"></i>Alterar senha</a>
            </form>

            <!-- FORM ALTERAR SENHA -->
            <form id="formAlterarSenha" novalidate style="display:none;">
                <div class="mb-3">
                    <label class="form-label">Usuário</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                        <input type="text" class="form-control" id="asUsuario" placeholder="Nome de usuário" autocomplete="username" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha atual</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" id="asSenhaAtual" placeholder="Senha atual" required>
                        <button class="btn-secondary-v" type="button" onclick="toggleVer('asSenhaAtual','icAS')" tabindex="-1" style="border-radius:0 8px 8px 0;padding:0 12px;"><i class="bi bi-eye-fill" id="icAS"></i></button>
                    </div>
                </div>
                <div class="mb-2">
                    <label class="form-label">Nova senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" id="asSenhaNova" placeholder="Mínimo 6 caracteres" oninput="avaliarForca(this.value)" required>
                        <button class="btn-secondary-v" type="button" onclick="toggleVer('asSenhaNova','icNova')" tabindex="-1" style="border-radius:0 8px 8px 0;padding:0 12px;"><i class="bi bi-eye-fill" id="icNova"></i></button>
                    </div>
                    <div class="senha-strength"><div class="senha-strength-bar" id="forcaBar"></div></div>
                    <div class="senha-hint" id="forcaHint"></div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirmar nova senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" id="asSenhaConfirma" placeholder="Repita a nova senha" oninput="checarConfirma()" required>
                        <button class="btn-secondary-v" type="button" onclick="toggleVer('asSenhaConfirma','icConf')" tabindex="-1" style="border-radius:0 8px 8px 0;padding:0 12px;"><i class="bi bi-eye-fill" id="icConf"></i></button>
                    </div>
                    <div class="senha-hint" id="confirmaHint"></div>
                </div>
                <button type="submit" id="btnAlterarSenha" class="btn-primary-v w-100 justify-content-center">
                    <i class="bi bi-check-circle-fill"></i> Salvar nova senha
                </button>
                <a class="link-alterar" id="linkVoltarLogin"><i class="bi bi-arrow-left me-1"></i>Voltar ao login</a>
            </form>
        </div>

        <div class="login-footer">
            <i class="bi bi-shield-lock me-1"></i> Acesso restrito — LZTec &copy; 2025
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    
    // ── THEME ─────────────────────────────────────────────────────────────
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        const icon = document.getElementById('themeIcon');
        const btn  = document.getElementById('btnTheme');
        if (!icon) return;
        if (theme === 'light') { icon.className = 'bi bi-sun-fill'; if(btn) btn.style.color='#F5A623'; }
        else                   { icon.className = 'bi bi-moon-fill'; if(btn) btn.style.color=''; }
    }
    function toggleTheme() {
        const next = (document.documentElement.getAttribute('data-theme')||'dark') === 'dark' ? 'light' : 'dark';
        localStorage.setItem('valora_theme', next);
        applyTheme(next);
    }
    applyTheme(localStorage.getItem('valora_theme') || 'dark');

    // ── AVISO DE CAPS LOCK ───────────────────────────────────────────────────
    // Insere um aviso "Caps Lock está ativado" abaixo de todo campo de senha
    // da página (login e alterar senha), mostrando/escondendo em tempo real
    // com base no estado real da tecla (não em heurística de texto digitado).
    function ativarAvisoCapsLock(input) {
        const aviso = document.createElement('div');
        aviso.style.cssText = 'display:none;color:var(--amarelo);font-size:0.8rem;margin-top:6px;';
        aviso.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> Caps Lock está ativado';
        // O aviso fica fora do .input-group (que tem o botão de mostrar senha),
        // então insere depois do .input-group, não depois do input em si.
        const wrapper = input.closest('.input-group') || input;
        wrapper.insertAdjacentElement('afterend', aviso);

        const checar = (e) => {
            const ativo = e.getModifierState && e.getModifierState('CapsLock');
            aviso.style.display = ativo ? 'flex' : 'none';
            aviso.style.alignItems = 'center';
            aviso.style.gap = '4px';
        };
        input.addEventListener('keyup', checar);
        input.addEventListener('keydown', checar);
        input.addEventListener('mousedown', checar);
        // Ao trocar de campo (focus) o estado pode já estar diferente do que
        // o último evento de tecla indicou; sem um evento de teclado disponível
        // aqui, simplesmente esconde o aviso até a próxima tecla pressionada.
        input.addEventListener('blur', () => { aviso.style.display = 'none'; });
    }
    document.querySelectorAll('input[type="password"]').forEach(ativarAvisoCapsLock);

    // ─────────────────────────────────────────────────────────────────────


    // Detecta automaticamente se está rodando local (teste no seu PC) ou
    // publicado (Netlify/produção), e usa a URL do backend correspondente.
    // Não precisa editar nada à mão para alternar entre testar local e produção.
    const _BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
        ? 'http://localhost:8080'
        : 'https://valora-production-35b1.up.railway.app';
    const loginForm      = document.getElementById('loginForm');
    const btnEntrar      = document.getElementById('btnEntrar');
    const alertContainer = document.getElementById('alertContainer');
    const inputSenha     = document.getElementById('inputSenha');
    const btnToggle      = document.getElementById('btnToggleSenha');
    const iconeSenha     = document.getElementById('iconeSenha');

    btnToggle.addEventListener('click', () => {
        const v = inputSenha.type === 'text';
        inputSenha.type = v ? 'password' : 'text';
        iconeSenha.className = v ? 'bi bi-eye-fill' : 'bi bi-eye-slash-fill';
    });

    function showFeedback(msg, tipo='danger') {
        alertContainer.innerHTML = `<div class="alert alert-${tipo} alert-dismissible fade show d-flex gap-3" role="alert"><div class="flex-grow-1">${msg}</div><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
        alertContainer.style.display = 'block';
    }

    function setLoading(on) {
        btnEntrar.innerHTML = on
            ? '<span class="spinner-border spinner-border-sm me-2"></span> Entrando...'
            : '<i class="bi bi-box-arrow-in-right"></i> Entrar';
        btnEntrar.disabled = on;
    }

    loginForm.addEventListener('submit', async e => {
        e.preventDefault();
        const user = document.getElementById('inputUsername').value.trim();
        const pass = inputSenha.value;
        if (!user || !pass) { showFeedback('Preencha usuário e senha.', 'warning'); return; }
        alertContainer.style.display = 'none';
        setLoading(true);
        // REQUISITO BANCA: login gera e valida token (JWT)
        try {
            const r = await fetch(`${_BASE}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome: user, senha: pass })
            });
            if (r.ok) {
                const dados = await r.json();
                localStorage.setItem('auth_token', 'Bearer ' + dados.token);
                localStorage.setItem('user_role', dados.role);
                localStorage.setItem('user_nome', dados.nome);
                showFeedback('Login realizado! Redirecionando...', 'success');
                setTimeout(() => window.location.href='dashboard.html', 600);
            }
            else if (r.status === 401) { showFeedback('Usuário ou senha incorretos.'); setLoading(false); }
            else                { showFeedback(`Erro no servidor (${r.status}). Verifique se o backend está ativo.`); setLoading(false); }
        } catch { showFeedback('Erro de conexão. Verifique se o Spring Boot está rodando.'); setLoading(false); }
    });

    // ── ALTERNAR SENHA VISÍVEL ─────────────────────────────────────────────
    function toggleVer(inputId, iconId) {
        const inp = document.getElementById(inputId);
        const ic  = document.getElementById(iconId);
        const vis = inp.type === 'text';
        inp.type = vis ? 'password' : 'text';
        ic.className = vis ? 'bi bi-eye-fill' : 'bi bi-eye-slash-fill';
    }

    // ── FORÇA DA SENHA ────────────────────────────────────────────────────
    function avaliarForca(val) {
        const bar  = document.getElementById('forcaBar');
        const hint = document.getElementById('forcaHint');
        let pontos = 0;
        if (val.length >= 6)  pontos++;
        if (val.length >= 10) pontos++;
        if (/[A-Z]/.test(val)) pontos++;
        if (/[0-9]/.test(val)) pontos++;
        if (/[^A-Za-z0-9]/.test(val)) pontos++;
        const niveis = [
            { pct: '0%',   cor: 'transparent', txt: '' },
            { pct: '25%',  cor: '#e74c3c',     txt: '🔴 Muito fraca' },
            { pct: '50%',  cor: '#e67e22',     txt: '🟠 Fraca' },
            { pct: '65%',  cor: '#f1c40f',     txt: '🟡 Média' },
            { pct: '85%',  cor: '#2ecc71',     txt: '🟢 Forte' },
            { pct: '100%', cor: '#1abc9c',     txt: '✅ Muito forte' },
        ];
        const n = niveis[pontos];
        bar.style.width      = n.pct;
        bar.style.background = n.cor;
        hint.textContent     = n.txt;
        hint.style.color     = n.cor;
        checarConfirma();
    }

    function checarConfirma() {
        const nova     = document.getElementById('asSenhaNova').value;
        const confirma = document.getElementById('asSenhaConfirma').value;
        const hint     = document.getElementById('confirmaHint');
        if (!confirma) { hint.textContent = ''; return; }
        if (nova === confirma) {
            hint.textContent = '✔ Senhas coincidem';
            hint.style.color = '#2ecc71';
        } else {
            hint.textContent = '✖ Senhas não coincidem';
            hint.style.color = '#e74c3c';
        }
    }

    // ── ALTERNAR ENTRE FORMS ──────────────────────────────────────────────
    document.getElementById('linkAlterarSenha').addEventListener('click', () => {
        document.getElementById('loginForm').style.display        = 'none';
        document.getElementById('formAlterarSenha').style.display = 'block';
        alertContainer.style.display = 'none';
    });
    document.getElementById('linkVoltarLogin').addEventListener('click', () => {
        document.getElementById('formAlterarSenha').style.display = 'none';
        document.getElementById('loginForm').style.display        = 'block';
        alertContainer.style.display = 'none';
    });

    // ── SUBMIT ALTERAR SENHA ──────────────────────────────────────────────
    document.getElementById('formAlterarSenha').addEventListener('submit', async e => {
        e.preventDefault();
        const usuario  = document.getElementById('asUsuario').value.trim();
        const atual    = document.getElementById('asSenhaAtual').value;
        const nova     = document.getElementById('asSenhaNova').value;
        const confirma = document.getElementById('asSenhaConfirma').value;

        // Validações
        if (!usuario || !atual || !nova || !confirma) {
            showFeedback('Preencha todos os campos.', 'warning'); return;
        }
        if (nova.length < 6) {
            showFeedback('A nova senha deve ter pelo menos 6 caracteres.', 'warning'); return;
        }
        if (nova !== confirma) {
            showFeedback('As senhas não coincidem.', 'warning'); return;
        }
        if (nova === atual) {
            showFeedback('A nova senha não pode ser igual à senha atual.', 'warning'); return;
        }

        const btn = document.getElementById('btnAlterarSenha');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Salvando...';
        btn.disabled  = true;
        alertContainer.style.display = 'none';

        // Verifica se a senha atual está correta usando o mesmo login (JWT)
        try {
            const chk = await fetch(`${_BASE}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome: usuario, senha: atual })
            });
            if (!chk.ok) {
                showFeedback('Usuário ou senha atual incorretos.', 'danger');
                btn.innerHTML = '<i class="bi bi-check-circle-fill"></i> Salvar nova senha';
                btn.disabled  = false;
                return;
            }
            const dadosLogin = await chk.json();
            // Envia a troca de senha para o backend
            const res = await fetch(`${_BASE}/api/usuarios/alterar-senha`, {
                method:  'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + dadosLogin.token },
                body:    JSON.stringify({ username: usuario, senhaAtual: atual, novaSenha: nova })
            });
            if (res.ok) {
                showFeedback('Senha alterada com sucesso! Faça login com a nova senha.', 'success');
                setTimeout(() => {
                    document.getElementById('formAlterarSenha').style.display = 'none';
                    document.getElementById('loginForm').style.display        = 'block';
                    document.getElementById('formAlterarSenha').reset();
                    document.getElementById('forcaBar').style.width = '0';
                    document.getElementById('forcaHint').textContent = '';
                    document.getElementById('confirmaHint').textContent = '';
                }, 1800);
            } else {
                showFeedback('Erro ao alterar senha. Tente novamente.', 'danger');
            }
        } catch {
            showFeedback('Erro de conexão. Verifique se o Spring Boot está rodando.', 'danger');
        }
        btn.innerHTML = '<i class="bi bi-check-circle-fill"></i> Salvar nova senha';
        btn.disabled  = false;
    });

    window.onload = () => { const t=localStorage.getItem('auth_token'); if(t&&t.length>10) window.location.href='dashboard.html'; };
</script>
</body>
</html>
